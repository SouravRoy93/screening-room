name: Grow places catalog

on:
  schedule:
    - cron: "0 9 * * *"      # every day at 09:00 UTC — adds 15-20 new places
  workflow_dispatch:          # also run on demand from the Actions tab
    inputs:
      count:
        description: "How many places to add this run"
        required: false
        default: "18"

permissions:
  contents: write

# Prevent overlapping runs from fighting over places.json
concurrency:
  group: grow-places
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Add new places
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEW_PER_RUN: ${{ github.event.inputs.count || '18' }}
        run: node scripts/grow-places.mjs

      - name: Commit updated places.json
        run: |
          git config user.name  "places-bot"
          git config user.email "places-bot@users.noreply.github.com"
          git add places.json
          if git diff --staged --quiet; then
            echo "No new places this run."
          else
            git commit -m "Grow places catalog ($(date -u +%Y-%m-%d))"
            git push
          fi
