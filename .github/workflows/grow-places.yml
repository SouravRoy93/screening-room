name: Grow places catalog

on:
  schedule:
    - cron: "0 9 * * *"      # daily 09:00 UTC
  workflow_dispatch:
    inputs:
      count:
        description: "How many places to add this run"
        required: false
        default: "18"

permissions:
  contents: write

concurrency:
  group: grow-places
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: screening-room-growth
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Add new places (Google discovery + Claude editorial)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          NEW_PER_RUN: ${{ github.event.inputs.count || '18' }}
        run: node scripts/grow/places.mjs
      - name: Commit
        run: |
          git config user.name  "places-bot"
          git config user.email "places-bot@users.noreply.github.com"
          git add artifacts/screening-room/public/places.json
          if git diff --staged --quiet; then echo "No new places."; exit 0; fi
          git commit -m "Grow places ($(date -u +%Y-%m-%d))"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin screening-room-growth && \
            git push origin HEAD:screening-room-growth && exit 0
            echo "push race, retrying ($i)…"; sleep 7
          done
          echo "push failed after retries"; exit 1
