name: Grow places catalog

on:
  schedule:
    - cron: "0 9 * * *"      # daily 09:00 UTC
  workflow_dispatch:
    inputs:
      count:
        description: "How many places to add this run"
        required: false
        default: "18"

permissions:
  contents: write

concurrency:
  group: grow-places
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Add new places (Google discovery + Claude editorial)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          NEW_PER_RUN: ${{ github.event.inputs.count || '18' }}
        run: node scripts/grow/places.mjs
      - name: Commit
        run: |
          git config user.name  "places-bot"
          git config user.email "places-bot@users.noreply.github.com"
          git add artifacts/screening-room/public/places.json
          if git diff --staged --quiet; then echo "No new places."; else
            git commit -m "Grow places ($(date -u +%Y-%m-%d))" && git push
          fi
