name: Update catalog

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # allow the action to commit catalog.json back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch fresh titles from TMDB
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: node scripts/update-catalog.mjs

      - name: Commit updated catalog
        run: |
          git config user.name  "catalog-bot"
          git config user.email "catalog-bot@users.noreply.github.com"
          git add catalog.json
          if git diff --staged --quiet; then
            echo "No catalog changes today."
          else
            git commit -m "Daily catalog update ($(date -u +%Y-%m-%d))"
            git push
          fi
