name: Grow dining catalog

on:
  schedule:
    - cron: "45 9 * * *"     # daily 09:45 UTC (45 min after places)
  workflow_dispatch:
    inputs:
      count:
        description: "How many restaurants to add this run"
        required: false
        default: "15"

permissions:
  contents: write

concurrency:
  group: grow-dining
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: screening-room-growth
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Add new restaurants (Google discovery + Claude classification)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          NEW_PER_RUN: ${{ github.event.inputs.count || '15' }}
        run: node scripts/grow/dining.mjs
      - name: Commit
        run: |
          git config user.name  "dining-bot"
          git config user.email "dining-bot@users.noreply.github.com"
          git add artifacts/screening-room/public/dining.json
          if git diff --staged --quiet; then echo "No new restaurants."; exit 0; fi
          git commit -m "Grow dining ($(date -u +%Y-%m-%d))"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin screening-room-growth && \
            git push origin HEAD:screening-room-growth && exit 0
            echo "push race, retrying ($i)…"; sleep 7
          done
          echo "push failed after retries"; exit 1
