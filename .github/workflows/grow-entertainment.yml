name: Grow entertainment catalog

on:
  schedule:
    - cron: "40 9 * * *"     # daily 09:40 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: grow-entertainment
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh catalog from TMDB
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: node scripts/grow/entertainment.mjs
      - name: Commit
        run: |
          git config user.name  "catalog-bot"
          git config user.email "catalog-bot@users.noreply.github.com"
          git add artifacts/screening-room/public/catalog.json
          if git diff --staged --quiet; then echo "No catalog changes."; else
            git commit -m "Grow catalog ($(date -u +%Y-%m-%d))" && git push
          fi
